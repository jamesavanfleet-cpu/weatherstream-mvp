<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>My Cruising Weather</title>
    <meta name="description" content="Personalized weather for every port of call and every sea day on your cruise itinerary. Forecasts for 100+ ships across all major cruise lines." />
    
    <!-- GitHub Pages SPA routing: handle redirected paths from 404.html -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle ?p= query param from 404.html redirect
        // GitHub Pages 404.html converts /route-map?itinerary=X to /?p=/route-map&q=itinerary=X
        // We reconstruct the correct URL so the React router sees the right path.
        var l = window.location;
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            // q.p is the intended path (e.g. '/route-map')
            // q.q is the intended query string (e.g. 'itinerary=BASE64')
            // The site is at the root of the domain, so use q.p directly as the path.
            window.history.replaceState(
              null, null,
              (q.p || '/') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
          }
        }
      })();
    </script>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA: iOS / Safari home screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="My Cruising Weather" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-v2.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152-v2.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192-v2.png" />

    <!-- PWA: Android / Chrome theme color -->
    <meta name="theme-color" content="#080e20" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32-v2.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192-v2.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
