name: Generate Maritime Routes

on:
  push:
    branches: [main]
    paths:
      - 'client/src/data/ports.ts'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install searoute
      - name: Generate maritime routes
        run: python scripts/generate_maritime_routes.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/maritime_routes.json
          git diff --staged --quiet || git commit -m "chore: regenerate maritime routes"
          git push
