name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build production bundle
        run: pnpm run build

      - name: Deploy to gh-pages
        run: |
          git config user.email "deploy@vanfleet-wx"
          git config user.name "VanFleet Deploy"

          # Stash the built output before switching branches
          cp -r dist/public /tmp/deploy-output

          # Switch to gh-pages branch.
          # --no-frozen-lockfile may update pnpm-lock.yaml; discard all working
          # tree changes before checkout to prevent "would be overwritten" errors.
          git fetch origin gh-pages
          git checkout --discard-changes gh-pages

          # Preserve CNAME and 404.html
          cp CNAME /tmp/cname-backup 2>/dev/null || true
          cp 404.html /tmp/404-backup 2>/dev/null || true

          # Preserve ALL existing JSON data files from gh-pages so a code-only
          # deploy never wipes live data. These are written by the forecast and
          # hourly workflows and must survive across deploys.
          cp forecast.json /tmp/forecast-backup.json 2>/dev/null || true
          cp intel.json /tmp/intel-backup.json 2>/dev/null || true
          cp top_story.json /tmp/top_story-backup.json 2>/dev/null || true
          cp live_conditions.json /tmp/live_conditions-backup.json 2>/dev/null || true

          # Remove old assets and replace with new build
          rm -f assets/*.js assets/*.css
          cp -r /tmp/deploy-output/assets/. assets/
          cp /tmp/deploy-output/index.html index.html

          # Restore preserved files
          cp /tmp/cname-backup CNAME 2>/dev/null || true
          cp /tmp/404-backup 404.html 2>/dev/null || true

          # Restore JSON data files (never overwrite with empty/missing files)
          cp /tmp/forecast-backup.json forecast.json 2>/dev/null || true
          cp /tmp/intel-backup.json intel.json 2>/dev/null || true
          cp /tmp/top_story-backup.json top_story.json 2>/dev/null || true
          cp /tmp/live_conditions-backup.json live_conditions.json 2>/dev/null || true

          # Commit and push
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy: auto-deploy from main branch commit ${{ github.sha }}"
          git push origin gh-pages
