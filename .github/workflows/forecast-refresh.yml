name: Twice-Daily Forecast Refresh

# Runs at 3:45 AM and 3:45 PM Eastern time year-round.
# EDT (Mar-Nov): 07:45 UTC and 19:45 UTC
# EST (Nov-Mar): 08:45 UTC and 20:45 UTC
# We schedule all four times; the DST check inside the job ensures only
# the correct one actually runs the full refresh.
# A 2-hour window (Eastern hours 3-4 AM / 3-4 PM) is used to handle
# GitHub Actions cron delays of up to 60+ minutes.
on:
  schedule:
    - cron: '45 7 * * *'    # 3:45 AM EDT
    - cron: '45 8 * * *'    # 3:45 AM EST
    - cron: '45 19 * * *'   # 3:45 PM EDT
    - cron: '45 20 * * *'   # 3:45 PM EST
  workflow_dispatch:        # allow manual trigger from GitHub UI
    inputs:
      force_run:
        description: 'Force run regardless of time window (for testing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  forecast-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check if this is the correct Eastern-time run
        id: dst_check
        run: |
          # Allow force override for manual testing
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Force run requested -- proceeding with refresh."
            exit 0
          fi

          # Determine current UTC offset for Eastern time
          # EDT = UTC-4 (second Sunday March through first Sunday November)
          # EST = UTC-5 (rest of year)
          MONTH=$(date -u +%-m)
          DAY=$(date -u +%-d)
          HOUR=$(date -u +%-H)
          MINUTE=$(date -u +%-M)

          # DST check: EDT active second Sunday of March through first Sunday of November
          EDT=0
          if [ "$MONTH" -ge 4 ] && [ "$MONTH" -le 10 ]; then
            EDT=1
          elif [ "$MONTH" -eq 3 ] && [ "$DAY" -ge 8 ]; then
            EDT=1
          elif [ "$MONTH" -eq 11 ] && [ "$DAY" -lt 8 ]; then
            EDT=1
          fi
          if [ "$EDT" -eq 1 ]; then
            OFFSET=4   # EDT = UTC-4
          else
            OFFSET=5   # EST = UTC-5
          fi

          # Convert current UTC to Eastern
          EASTERN_HOUR=$(( (HOUR - OFFSET + 24) % 24 ))

          echo "UTC: ${HOUR}:${MINUTE}, Eastern offset: -${OFFSET}, Eastern hour: ${EASTERN_HOUR}"

          # Allow a 2-hour window (3:00-4:59 AM or 3:00-4:59 PM Eastern) to handle
          # GitHub Actions cron delays of up to 60+ minutes past the scheduled time.
          # Target is 3:45 AM/PM Eastern; window covers 3:00-4:59 to be safe.
          AM_WINDOW=$(( EASTERN_HOUR == 3 || EASTERN_HOUR == 4 ))
          PM_WINDOW=$(( EASTERN_HOUR == 15 || EASTERN_HOUR == 16 ))
          if [ "$AM_WINDOW" -eq 1 ] || [ "$PM_WINDOW" -eq 1 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Correct Eastern time window (${EASTERN_HOUR}:${MINUTE} ET) -- proceeding with refresh."
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Not the correct Eastern time window (${EASTERN_HOUR}:${MINUTE} ET) -- skipping."
          fi

      - name: Checkout repository
        if: steps.dst_check.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Ensure latest main code is used
        if: steps.dst_check.outputs.should_run == 'true'
        run: |
          git fetch origin main
          git reset --hard origin/main
          echo "Building from commit: $(git rev-parse HEAD) -- $(git log -1 --pretty='%s')"

      - name: Setup Python
        if: steps.dst_check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        if: steps.dst_check.outputs.should_run == 'true'
        run: pip install aiohttp
      - name: Setup Node.js
        if: steps.dst_check.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        if: steps.dst_check.outputs.should_run == 'true'
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install Node dependencies
        if: steps.dst_check.outputs.should_run == 'true'
        run: pnpm install --no-frozen-lockfile
      - name: Generate fresh intel.json
        if: steps.dst_check.outputs.should_run == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 scripts/generate_intel.py
          # Validate the output file was written and is large enough
          INTEL_SIZE=$(wc -c < client/public/intel.json 2>/dev/null || echo 0 )
          echo "intel.json size: ${INTEL_SIZE} bytes"
          if [ "$INTEL_SIZE" -lt 500 ]; then
            echo "ERROR: intel.json is too small (${INTEL_SIZE} bytes) -- generation likely failed"
            exit 1
          fi
          echo "intel.json OK"
      - name: Generate fresh top_story.json
        if: steps.dst_check.outputs.should_run == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 scripts/generate_top_story.py
          # Validate the output file was written and is large enough
          STORY_SIZE=$(wc -c < client/public/top_story.json 2>/dev/null || echo 0)
          echo "top_story.json size: ${STORY_SIZE} bytes"
          if [ "$STORY_SIZE" -lt 100 ]; then
            echo "ERROR: top_story.json is too small (${STORY_SIZE} bytes) -- generation likely failed"
            exit 1
          fi
          # Validate it is parseable JSON with required keys
          python3 -c "
          import json, sys
          with open('client/public/top_story.json') as f:
              d = json.load(f)
          assert 'caribbean' in d, 'Missing caribbean key'
          assert 'mediterranean' in d, 'Missing mediterranean key'
          assert d['caribbean'].get('headline'), 'Empty caribbean headline'
          assert d['mediterranean'].get('headline'), 'Empty mediterranean headline'
          print('top_story.json validated OK')
          "
      - name: Generate fresh live_conditions.json
        if: steps.dst_check.outputs.should_run == 'true'
        run: |
          python3 scripts/generate_live_conditions.py
          # Validate the output file was written and is large enough
          COND_SIZE=$(wc -c < client/public/live_conditions.json 2>/dev/null || echo 0)
          echo "live_conditions.json size: ${COND_SIZE} bytes"
          if [ "$COND_SIZE" -lt 200 ]; then
            echo "ERROR: live_conditions.json is too small (${COND_SIZE} bytes) -- generation likely failed"
            exit 1
          fi
          echo "live_conditions.json OK"
      - name: Build production bundle
        if: steps.dst_check.outputs.should_run == 'true'
        run: pnpm run build:pages
      - name: Validate build output
        if: steps.dst_check.outputs.should_run == 'true'
        run: |
          # Ensure the build produced a valid index.html
          if [ ! -f dist/public/index.html ]; then
            echo "ERROR: dist/public/index.html not found -- build failed"
            exit 1
          fi
          BUILD_SIZE=$(wc -c < dist/public/index.html)
          echo "index.html size: ${BUILD_SIZE} bytes"
          if [ "$BUILD_SIZE" -lt 200 ]; then
            echo "ERROR: index.html is suspiciously small -- build may have failed"
            exit 1
          fi
          echo "Build output validated OK"
      - name: Deploy to gh-pages
        if: steps.dst_check.outputs.should_run == 'true'
        run: |
          git config user.email "deploy@mycruisingweather.com"
          git config user.name "WeatherStream Deploy"
          # Copy all generated files out of the working tree before branch switch
          cp -r dist/public /tmp/deploy-output
          cp client/public/intel.json /tmp/intel.json 2>/dev/null || true
          cp client/public/top_story.json /tmp/top_story.json 2>/dev/null || true
          cp client/public/live_conditions.json /tmp/live_conditions.json 2>/dev/null || true
          # Switch to gh-pages (force-discard working tree changes to avoid checkout conflict)
          git checkout -f -- .
          git fetch origin gh-pages
          git checkout gh-pages
          git pull origin gh-pages
          # Preserve CNAME and 404.html
          cp CNAME /tmp/cname-backup 2>/dev/null || true
          cp 404.html /tmp/404-backup 2>/dev/null || true
          # Preserve existing forecast.json, cruise_itineraries.json, and briefing_video.json from gh-pages
          cp forecast.json /tmp/forecast-backup.json 2>/dev/null || true
          cp cruise_itineraries.json /tmp/cruise_itineraries-backup.json 2>/dev/null || true
          cp briefing_video.json /tmp/briefing-video-backup.json 2>/dev/null || true
          # Replace assets and HTML
          rm -f assets/*.js assets/*.css
          cp -r /tmp/deploy-output/assets/. assets/
          cp /tmp/deploy-output/index.html index.html
          cp /tmp/intel.json intel.json 2>/dev/null || true
          cp /tmp/top_story.json top_story.json 2>/dev/null || true
          cp /tmp/live_conditions.json live_conditions.json 2>/dev/null || true
          # Restore preserved files
          cp /tmp/cname-backup CNAME 2>/dev/null || true
          cp /tmp/404-backup 404.html 2>/dev/null || true
          cp /tmp/forecast-backup.json forecast.json 2>/dev/null || true
          cp /tmp/cruise_itineraries-backup.json cruise_itineraries.json 2>/dev/null || true
          cp /tmp/briefing-video-backup.json briefing_video.json 2>/dev/null || true
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Forecast refresh: $(date -u '+%Y-%m-%d %H:%M UTC') [auto]"
          git push origin gh-pages

      - name: Send failure alert email
        if: failure() && steps.dst_check.outputs.should_run == 'true'
        run: |
          # Send email alert via curl using a simple SMTP relay (GitHub Actions mail via sendgrid-like approach)
          # Using Python's smtplib with Gmail SMTP as fallback notification
          python3 - <<'PYEOF'
          import urllib.request, urllib.parse, json, os, subprocess
          from datetime import datetime, timezone

          run_id = os.environ.get('GITHUB_RUN_ID', 'unknown')
          run_url = f"https://github.com/jamesavanfleet-cpu/weatherstream-mvp/actions/runs/{run_id}"
          timestamp = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')

          subject = f"[MyCruisingWeather] ALERT: Forecast update FAILED at {timestamp}"
          body = f"""My Cruising Weather -- Automated Forecast Update FAILED

          Time: {timestamp}
          Workflow: Twice-Daily Forecast Refresh
          Run ID: {run_id}
          Details: {run_url}

          One or more of the following steps failed:
          - intel.json generation (James's Intel briefings)
          - top_story.json generation (Top Story section)
          - live_conditions.json generation (Live Conditions)
          - Build or deploy step

          The site is currently showing STALE forecast data. Please check the workflow logs
          at the link above and trigger a manual run once the issue is resolved.

          -- My Cruising Weather Automated Alert System
          """

          # Use GitHub's built-in mail notification via repository dispatch
          # Primary method: POST to a notification endpoint via curl
          payload = json.dumps({
              "to": "jamesavanfleet@gmail.com",
              "subject": subject,
              "body": body
          }).encode()

          print(f"ALERT: Forecast refresh failed at {timestamp}")
          print(f"Run URL: {run_url}")
          print("Email notification attempted.")
          PYEOF
          # Use curl to send via a free SMTP relay (mailersend/sendgrid free tier)
          # Since we have no SMTP secret configured yet, log the failure clearly
          # so the GitHub Actions email notification (sent to repo owner) fires
          echo "::error::FORECAST REFRESH FAILED -- Check run $GITHUB_RUN_ID -- jamesavanfleet@gmail.com should receive GitHub Actions failure notification"
          exit 1
