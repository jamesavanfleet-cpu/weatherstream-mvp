forecast-refresh-CORRECTED.yml
name: Twice-Daily Forecast Refresh

# Runs at 4:00 AM and 4:00 PM Eastern time year-round.
# EDT (Mar-Nov): 08:00 UTC and 20:00 UTC
# EST (Nov-Mar): 09:00 UTC and 21:00 UTC
# We schedule all four times; the DST check inside the job ensures only
# the correct one actually runs the full refresh.
on:
  schedule:
    - cron: '0 8 * * *'    # 4:00 AM EDT
    - cron: '0 9 * * *'    # 4:00 AM EST
    - cron: '0 20 * * *'   # 4:00 PM EDT
    - cron: '0 21 * * *'   # 4:00 PM EST
  workflow_dispatch:        # allow manual trigger from GitHub UI
    inputs:
      force_run:
        description: 'Force run regardless of time window (for testing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  forecast-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check if this is the correct Eastern-time run
        id: dst_check
        run: |
          # Allow force override for manual testing
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Force run requested -- proceeding with refresh."
            exit 0
          fi

          # Determine current UTC offset for Eastern time
          # EDT = UTC-4 (second Sunday March through first Sunday November)
          # EST = UTC-5 (rest of year)
          MONTH=$(date -u +%-m)
          DAY=$(date -u +%-d)
          DOW=$(date -u +%u)  # 1=Mon ... 7=Sun
          HOUR=$(date -u +%-H)
          MINUTE=$(date -u +%-M)

          # DST check: EDT active second Sunday of March through first Sunday of November
          EDT=0
          if [ "$MONTH" -ge 4 ] && [ "$MONTH" -le 10 ]; then
            EDT=1
          elif [ "$MONTH" -eq 3 ] && [ "$DAY" -ge 8 ]; then
            EDT=1
          elif [ "$MONTH" -eq 11 ] && [ "$DAY" -lt 8 ]; then
            EDT=1
          fi
          if [ "$EDT" -eq 1 ]; then
            OFFSET=4   # EDT = UTC-4
          else
            OFFSET=5   # EST = UTC-5
          fi

          # Convert current UTC to Eastern
          EASTERN_HOUR=$(( (HOUR - OFFSET + 24) % 24 ))

          echo "UTC: ${HOUR}:${MINUTE}, Eastern offset: -${OFFSET}, Eastern hour: ${EASTERN_HOUR}"

          # Only proceed if Eastern hour is 4 (4:00 AM or 4:00 PM Eastern)
          if [ "$EASTERN_HOUR" -eq 4 ] || [ "$EASTERN_HOUR" -eq 16 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Correct Eastern time window -- proceeding with refresh."
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Not the correct Eastern time window -- skipping."
          fi

      - name: Checkout repository
        if: steps.dst_check.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Setup Python
        if: steps.dst_check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        if: steps.dst_check.outputs.should_run == 'true'
        run: pip install aiohttp
      - name: Setup Node.js
        if: steps.dst_check.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        if: steps.dst_check.outputs.should_run == 'true'
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install Node dependencies
        if: steps.dst_check.outputs.should_run == 'true'
        run: pnpm install --no-frozen-lockfile
      - name: Generate fresh intel.json
        if: steps.dst_check.outputs.should_run == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 scripts/generate_intel.py
          # Validate the output file was written and is large enough
          INTEL_SIZE=$(wc -c < client/public/intel.json 2>/dev/null || echo 0)
          echo "intel.json size: ${INTEL_SIZE} bytes"
          if [ "$INTEL_SIZE" -lt 500 ]; then
            echo "ERROR: intel.json is too small (${INTEL_SIZE} bytes) -- generation likely failed"
            exit 1
          fi
          echo "intel.json OK"
      - name: Generate fresh top_story.json
        if: steps.dst_check.outputs.should_run == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 scripts/generate_top_story.py
          # Validate the output file was written and is large enough
          STORY_SIZE=$(wc -c < client/public/top_story.json 2>/dev/null || echo 0)
          echo "top_story.json size: ${STORY_SIZE} bytes"
          if [ "$STORY_SIZE" -lt 100 ]; then
            echo "ERROR: top_story.json is too small (${STORY_SIZE} bytes) -- generation likely failed"
            exit 1
          fi
          # Validate it is parseable JSON with required keys
          python3 -c "
          import json, sys
          with open('client/public/top_story.json') as f:
              d = json.load(f)
          assert 'caribbean' in d, 'Missing caribbean key'
          assert 'mediterranean' in d, 'Missing mediterranean key'
          assert d['caribbean'].get('headline'), 'Empty caribbean headline'
          assert d['mediterranean'].get('headline'), 'Empty mediterranean headline'
          print('top_story.json validated OK')
          "
      - name: Generate fresh live_conditions.json
        if: steps.dst_check.outputs.should_run == 'true'
        run: |
          python3 scripts/generate_live_conditions.py
          # Validate the output file was written and is large enough
          COND_SIZE=$(wc -c < client/public/live_conditions.json 2>/dev/null || echo 0)
          echo "live_conditions.json size: ${COND_SIZE} bytes"
          if [ "$COND_SIZE" -lt 200 ]; then
            echo "ERROR: live_conditions.json is too small (${COND_SIZE} bytes) -- generation likely failed"
            exit 1
          fi
          echo "live_conditions.json OK"
      - name: Build production bundle
        if: steps.dst_check.outputs.should_run == 'true'
        run: pnpm run build:pages
      - name: Validate build output
        if: steps.dst_check.outputs.should_run == 'true'
        run: |
          # Ensure the build produced a valid index.html
          if [ ! -f dist/public/index.html ]; then
            echo "ERROR: dist/public/index.html not found -- build failed"
            exit 1
          fi
          BUILD_SIZE=$(wc -c < dist/public/index.html)
          echo "index.html size: ${BUILD_SIZE} bytes"
          if [ "$BUILD_SIZE" -lt 200 ]; then
            echo "ERROR: index.html is suspiciously small -- build may have failed"
            exit 1
          fi
          echo "Build output validated OK"
      - name: Deploy to gh-pages
        if: steps.dst_check.outputs.should_run == 'true'
        run: |
          git config user.email "deploy@mycruisingweather.com"
          git config user.name "WeatherStream Deploy"
          # Copy all generated files out of the working tree before branch switch
          cp -r dist/public /tmp/deploy-output
          cp client/public/intel.json /tmp/intel.json 2>/dev/null || true
          cp client/public/top_story.json /tmp/top_story.json 2>/dev/null || true
          cp client/public/live_conditions.json /tmp/live_conditions.json 2>/dev/null || true
          # Switch to gh-pages (force-discard working tree changes to avoid checkout conflict)
          git checkout -f -- .
          git fetch origin gh-pages
          git checkout gh-pages
          git pull origin gh-pages
          # Preserve CNAME and 404.html
          cp CNAME /tmp/cname-backup 2>/dev/null || true
          cp 404.html /tmp/404-backup 2>/dev/null || true
          # Preserve existing forecast.json from gh-pages (do not wipe it)
          cp forecast.json /tmp/forecast-backup.json 2>/dev/null || true
          # Replace assets and HTML
          rm -f assets/*.js assets/*.css
          cp -r /tmp/deploy-output/assets/. assets/
          cp /tmp/deploy-output/index.html index.html
          cp /tmp/intel.json intel.json 2>/dev/null || true
          cp /tmp/top_story.json top_story.json 2>/dev/null || true
          cp /tmp/live_conditions.json live_conditions.json 2>/dev/null || true
          # Restore preserved files
          cp /tmp/cname-backup CNAME 2>/dev/null || true
          cp /tmp/404-backup 404.html 2>/dev/null || true
          cp /tmp/forecast-backup.json forecast.json 2>/dev/null || true
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Forecast refresh: $(date -u '+%Y-%m-%d %H:%M UTC') [auto]"
          git push origin gh-pages
