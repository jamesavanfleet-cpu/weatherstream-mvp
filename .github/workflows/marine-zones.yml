name: Marine Zones Update

on:
  schedule:
    # Run weekly on Mondays at 06:00 UTC -- zone boundaries rarely change
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update-marine-zones:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate marine_zones.json
        run: python3 scripts/generate_marine_zones.py

      - name: Check if marine_zones.json changed
        id: diff
        run: |
          git diff --quiet client/public/marine_zones.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated marine_zones.json to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/marine_zones.json
          git commit -m "chore: update marine zone boundaries [skip ci]"
          git push origin main

      - name: Build and deploy to gh-pages
        if: steps.diff.outputs.changed == 'true'
        env:
          VITE_BASE_PATH: "/"
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile
          VITE_BASE_PATH="/" pnpm run build:pages
          cd dist/public
          git init -q
          git checkout -b gh-pages
          git add -A
          git commit -q -m "chore: marine zones update"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin gh-pages
