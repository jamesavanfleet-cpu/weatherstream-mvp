name: Itinerary Refresh (Playwright)

on:
  schedule:
    - cron: '0 10 * * 2,5'
    - cron: '0 11 * * 2,5'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run regardless of time window (for testing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      single_ship:
        description: 'Only refresh this ship name (leave blank for all ships)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  itinerary-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check if this is the correct Eastern-time run
        id: dst_check
        run: |
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          MONTH=$(date -u +%-m)
          DAY=$(date -u +%-d)
          HOUR=$(date -u +%-H)
          MINUTE=$(date -u +%-M)
          EDT=0
          if [ "$MONTH" -ge 4 ] && [ "$MONTH" -le 10 ]; then
            EDT=1
          elif [ "$MONTH" -eq 3 ] && [ "$DAY" -ge 8 ]; then
            EDT=1
          elif [ "$MONTH" -eq 11 ] && [ "$DAY" -lt 8 ]; then
            EDT=1
          fi
          if [ "$EDT" -eq 1 ]; then
            OFFSET=4
          else
            OFFSET=5
          fi
          EASTERN_HOUR=$(( (HOUR - OFFSET + 24) % 24 ))
          echo "UTC: ${HOUR}:${MINUTE}, Eastern offset: -${OFFSET}, Eastern hour: ${EASTERN_HOUR}"
          if [ "$EASTERN_HOUR" -eq 6 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.dst_check.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
- name: Ensure latest main code is used
        if: steps.dst_check.outputs.should_run == 'true'
        run: |
          git fetch origin main
          git reset --hard origin/main
          echo "Building from commit: $(git rev-parse HEAD) -- $(git log -1 --pre      - name: Setup Python
        if: steps.dst_check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: steps.dst_check.outputs.should_run == 'true'
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run Playwright itinerary refresh
        if: steps.dst_check.outputs.should_run == 'true'
        id: refresh
        run: |
          SHIP_ARG=""
          if [ -n "${{ github.event.inputs.single_ship }}" ]; then
            SHIP_ARG="--ship \"${{ github.event.inputs.single_ship }}\""
          fi
          python3 scripts/playwright_refresh.py $SHIP_ARG

      - name: Validate cruise_itineraries.json
        if: steps.dst_check.outputs.should_run == 'true'
        run: |
          JSON_SIZE=$(wc -c < client/public/cruise_itineraries.json 2>/dev/null || echo 0)
          if [ "$JSON_SIZE" -lt 10000 ]; then
            echo "ERROR: cruise_itineraries.json is too small"
            exit 1
          fi
          python3 -c "
          import json, sys
          with open('client/public/cruise_itineraries.json') as f:
              d = json.load(f)
          lines = d.get('cruise_lines', [])
          assert len(lines) >= 8, f'Expected 8+ cruise lines, got {len(lines)}'
          total_ships = sum(len(cl.get('ships', [])) for cl in lines)
          assert total_ships >= 100, f'Expected 100+ ships, got {total_ships}'
          print(f'Validated: {len(lines)} cruise lines, {total_ships} ships')
          "

      - name: Setup Node.js
        if: steps.dst_check.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        if: steps.dst_check.outputs.should_run == 'true'
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Node dependencies
        if: steps.dst_check.outputs.should_run == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Build production bundle
        if: steps.dst_check.outputs.should_run == 'true'
        run: pnpm run build:pages

      - name: Validate build output
        if: steps.dst_check.outputs.should_run == 'true'
        run: |
          if [ ! -f dist/public/index.html ]; then
            echo "ERROR: dist/public/index.html not found"
            exit 1
          fi
          BUILD_SIZE=$(wc -c < dist/public/index.html)
          if [ "$BUILD_SIZE" -lt 200 ]; then
            echo "ERROR: index.html is suspiciously small"
            exit 1
          fi

      - name: Deploy to gh-pages
        if: steps.dst_check.outputs.should_run == 'true'
        run: |
          git config user.email "deploy@mycruisingweather.com"
          git config user.name "WeatherStream Deploy"
          cp -r dist/public /tmp/deploy-output
          cp client/public/cruise_itineraries.json /tmp/cruise_itineraries.json 2>/dev/null || true
          git checkout -f -- .
          git fetch origin gh-pages
          git checkout gh-pages
          git pull origin gh-pages
          cp CNAME /tmp/cname-backup 2>/dev/null || true
          cp 404.html /tmp/404-backup 2>/dev/null || true
          cp forecast.json /tmp/forecast-backup.json 2>/dev/null || true
          cp intel.json /tmp/intel-backup.json 2>/dev/null || true
          cp top_story.json /tmp/top_story-backup.json 2>/dev/null || true
          cp live_conditions.json /tmp/live_conditions-backup.json 2>/dev/null || true
          rm -f assets/*.js assets/*.css
          cp -r /tmp/deploy-output/assets/. assets/
          cp /tmp/deploy-output/index.html index.html
          cp /tmp/cruise_itineraries.json cruise_itineraries.json 2>/dev/null || true
          cp /tmp/cname-backup CNAME 2>/dev/null || true
          cp /tmp/404-backup 404.html 2>/dev/null || true
          cp /tmp/forecast-backup.json forecast.json 2>/dev/null || true
          cp /tmp/intel-backup.json intel.json 2>/dev/null || true
          cp /tmp/top_story-backup.json top_story.json 2>/dev/null || true
          cp /tmp/live_conditions-backup.json live_conditions.json 2>/dev/null || true
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Itinerary refresh: $(date -u '+%Y-%m-%d %H:%M UTC') [auto]"
          git push origin gh-pages
