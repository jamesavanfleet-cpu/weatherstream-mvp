name: Fetch Weather Timestamps

# Fetches real available timestamps from NOAA WMS GetCapabilities and writes
# radar_times.json and satellite_times.json to gh-pages.
#
# The NOAA WMS server only returns real imagery when the TIME parameter
# exactly matches a cached timestamp.  Client-computed round-number intervals
# return fully transparent images.  This workflow runs on a tight schedule so
# the browser always has valid timestamps to use.
#
# Radar (MRMS composite reflectivity) updates every ~2 minutes.
# GOES satellite updates every 5 minutes.
# Global mosaic updates every 60 minutes.
#
# GitHub Actions minimum cron granularity is 5 minutes, so we run every 5
# minutes.  This is tight enough for both radar and satellite.

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch-weather-times:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch NOAA timestamps
        run: |
          python3 scripts/fetch_weather_times.py
          echo "radar_times.json: $(wc -c < client/public/radar_times.json) bytes"
          echo "satellite_times.json: $(wc -c < client/public/satellite_times.json) bytes"

      - name: Push updated JSON files to gh-pages
        run: |
          git config user.email "deploy@mycruisingweather.com"
          git config user.name "WeatherStream Deploy"

          cp client/public/radar_times.json /tmp/radar_times.json
          cp client/public/satellite_times.json /tmp/satellite_times.json

          git fetch origin gh-pages
          git checkout -f gh-pages
          git pull origin gh-pages

          cp /tmp/radar_times.json radar_times.json
          cp /tmp/satellite_times.json satellite_times.json

          git add radar_times.json satellite_times.json
          git diff --cached --quiet && echo "No changes to timestamp files, skipping push." && exit 0
          git commit -m "Weather timestamps update: $(date -u '+%Y-%m-%d %H:%M UTC') [auto]"
          git push origin gh-pages
